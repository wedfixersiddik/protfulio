<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navbar Fix Demo</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

/* NAVBAR */
header{
  position:fixed;
  top:0;
  width:100%;
  background:#111;
  padding:15px 30px;
  z-index:1000;
}

.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  color:#00ffcc;
  font-size:22px;
  font-weight:bold;
}

.nav-links{
  display:flex;
  gap:25px;
}

.nav-links a{
  color:#fff;
  text-decoration:none;
  transition:0.3s;
}

.nav-links a:hover{
  color:#00ffcc;
}

/* MOBILE MENU */
.menu-btn{
  display:none;
  font-size:24px;
  color:#fff;
  cursor:pointer;
}

/* SECTIONS */
section{
  height:100vh;
  padding-top:80px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
}

#home{background:#00ffcc;}
#about{background:#f4f4f4;}
#services{background:#ddd;}
#contact{background:#ccc;}

/* RESPONSIVE */
@media(max-width:768px){
  .nav-links{
    position:absolute;
    top:60px;
    right:0;
    background:#222;
    flex-direction:column;
    width:200px;
    display:none;
    padding:15px;
  }

  .nav-links.active{
    display:flex;
  }

  .menu-btn{
    display:block;
  }
}
</style>
</head>

<body>

<header>
  <div class="nav">
    <div class="logo">FixNav</div>

    <div class="nav-links" id="menu">
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <a href="#services">Services</a>
      <a href="#contact">Contact</a>
    </div>

    <div class="menu-btn" onclick="toggleMenu()">☰</div>
  </div>
</header>

<section id="home">Home Section</section>
<section id="about">About Section</section>
<section id="services">Services Section</section>
<section id="contact">Contact Section</section>

<script>
function toggleMenu(){
  document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>
