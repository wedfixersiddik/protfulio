<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Store</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{background:#f5f5f5;}

header{
  background:#111;
  color:#fff;
  padding:15px;
  position:sticky;
  top:0;
}

.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.nav h2{color:#00ffcc;}

.nav ul{
  display:flex;
  list-style:none;
  gap:20px;
}

.nav ul li{
  cursor:pointer;
}

.menu-btn{
  display:none;
  font-size:22px;
  cursor:pointer;
}

/* HERO */
.hero{
  text-align:center;
  padding:50px 20px;
  background:#00ffcc;
}

.hero h1{font-size:35px;}
.hero p{margin-top:10px;}

.hero button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  background:#111;
  color:#fff;
  cursor:pointer;
}

/* PRODUCTS */
.products{
  padding:40px 20px;
}

.products h2{
  text-align:center;
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:8px;
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  border-radius:5px;
}

.card h3{
  margin:10px 0;
}

.card button{
  padding:8px 15px;
  background:#00ffcc;
  border:none;
  cursor:pointer;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  background:#111;
  color:#fff;
  margin-top:20px;
}

/* RESPONSIVE */
@media(max-width:768px){
  .grid{
    grid-template-columns:repeat(2,1fr);
  }

  .nav ul{
    display:none;
    flex-direction:column;
    background:#222;
    position:absolute;
    top:60px;
    right:10px;
    padding:10px;
  }

  .nav ul.active{
    display:flex;
  }

  .menu-btn{
    display:block;
  }
}

@media(max-width:500px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>

</head>

<body>

<header>
  <div class="nav">
    <h2>DevStore</h2>
    <ul id="menu">
      <li>Home</li>
      <li>Products</li>
      <li>Contact</li>
    </ul>
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
  </div>
</header>

<section class="hero">
  <h1>Modern Product Store</h1>
  <p>Responsive & Clean Design</p>
  <button>Shop Now</button>
</section>

<section class="products">
  <h2>Our Products</h2>

  <div class="grid">
    <div class="card">
      <img src="https://via.placeholder.com/300" />
      <h3>Headphone</h3>
      <p>$50</p>
      <button>Buy Now</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300" />
      <h3>Smart Watch</h3>
      <p>$80</p>
      <button>Buy Now</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300" />
      <h3>Camera</h3>
      <p>$120</p>
      <button>Buy Now</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300" />
      <h3>Laptop</h3>
      <p>$700</p>
      <button>Buy Now</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300" />
      <h3>Keyboard</h3>
      <p>$40</p>
      <button>Buy Now</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300" />
      <h3>Mouse</h3>
      <p>$25</p>
      <button>Buy Now</button>
    </div>
  </div>
</section>

<footer>
  <p>© 2026 DevStore | Designed by Siddikur</p>
</footer>

<script>
function toggleMenu(){
  document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>
